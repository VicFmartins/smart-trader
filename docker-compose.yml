services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - .env.docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    env_file:
      - .env.docker
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD-SHELL", "ls /data/.minio.sys/format.json >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - minio-data:/data

  minio_setup:
    image: minio/mc:RELEASE.2025-02-15T10-36-16Z
    env_file:
      - .env.docker
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD; do
        echo 'Waiting for MinIO to become ready...';
        sleep 2;
      done;
      /usr/bin/mc mb --ignore-existing local/$$S3_BUCKET_NAME;
      /usr/bin/mc anonymous set private local/$$S3_BUCKET_NAME || true;
      "

  backend:
    build:
      context: .
    env_file:
      - .env.docker
    depends_on:
      postgres:
        condition: service_healthy
      minio_setup:
        condition: service_completed_successfully
    command: >
      /bin/sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "${PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  postgres-data:
  minio-data:
